[pytest]
addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/test-report.html
    --self-contained-html

markers =
    smoke:      Fast sanity checks
    regression: Full regression suite
    slow:       Tests expected to take more than 1s

minversion = 7.0
testpaths = .
log_cli       = true
log_cli_level = INFO